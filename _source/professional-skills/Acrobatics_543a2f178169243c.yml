  total: 0
  description: >-
    Acrobatics covers acts of balance, gymnastics, juggling, and tumbling. With
    a successful roll a character can move at full speed across an unstable or
    narrow surface. When mitigating damage from an unexpected fall a successful
    roll halves damage sustained. If the character does not suffer a Serious or
    Major Wound from the fall, they land safely and are not prone. Acrobatics
    can substitute for Evade, with the benefit that the character automatically
    regains their footing rather than being rendered prone.
